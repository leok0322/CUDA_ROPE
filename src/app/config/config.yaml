# Runner 配置 —— 由 runner.py 读取后构造 Runner / 造输入
# 两个顶层分组(run_params / model_arch)，load_config 会各自展平、合并成一个扁平字典

# ---- 运行/输入参数 ----
run_params:
  # 每条序列的【真实 token 数】列表(ragged，变长)：条目数=序列条数，元素值=该序列长度。
  # num_tokens = sum(token_size)，逐条真实相加、无 padding；positions 也按各序列分段 arange 拼接。
  token_size: [4, 4]    # 例：2 条序列，各 4 个 token；可写 [3, 5, 2] 等任意变长
  device: null          # null → 自动选(GPU 优先/CPU 兜底)；也可写 "cuda" / "cpu"
  dtype: float32        # 张量精度，字符串，runner 里映射到 torch.dtype
  seed: 0               # 随机种子

# ---- 模型架构参数（合并 qkv 模型 FusedQKVNormRope；键须与 Runner.__init__ 形参一一对应）----
model_arch:
  head_dim: 64          # 每个头的特征维（RMSNorm/RoPE 作用维，须为偶数）
  rotary_dim: null      # 每头参与 RoPE 旋转的维度数(<=head_dim，须偶数)；null→全旋转=head_dim
  eps: 1.0e-6           # RMSNorm 的数值稳定项
  base: 10000.0         # RoPE 频率底数
  max_token_size: 4096  # 模型上下文最大 token 数（cos/sin cache 行数 max_position）
  interleave: false     # RoPE 风格：false=neox(前后半配对)，true=interleave(相邻配对)

  # ---- 合并 qkv + 仅 QK 处理 + 分离 q/k 权重（贴近真实 vLLM kernel）----
  num_heads_q: 8        # Q 头数 Hq
  num_heads_k: 8        # K 头数 Hk（GQA 下可小于 Hq）
  num_heads_v: 8        # V 头数 Hv（只占位、透传，不归一化/旋转）

# ---- dtype 别名映射表 ----
# load_config 读取此表，把 run_params.dtype 字符串映射成 torch.dtype。
# 键 = 允许写在 dtype 处的别名（大小写不敏感）；值 = torch 模块下的属性名，
# load_config 用 getattr(torch, 值) 解析成真正的 torch.dtype（YAML 存不了 torch 对象，故存名字）。
dtype_map:
  float32: float32
  float: float32
  float16: float16
  half: float16
  bfloat16: bfloat16
  bf16: bfloat16
